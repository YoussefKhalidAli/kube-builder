- name: Load kubelet and kubeconfig vars
  include_vars: "{{ item }}"
  loop:
    - "{{ role_path }}/vars/kubelet.yml"
    - "{{ playbook_dir }}/roles/kubeconfig/vars/main.yml"

- name: Create kubelet directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ kubelet_tmp_dir }}"
    - "{{ kubelet_bin_dir }}"
    - "{{ kube_pki_dir }}"
    - "{{ kubelet_config_dir }}"

- name: Download kubelet
  get_url:
    url: "https://dl.k8s.io/release/{{ k8s_version }}/bin/linux/{{ arch }}/kubelet"
    dest: "{{ kubelet_tmp_dir }}/{{ name }}"
    mode: "0644"

- name: Move kubelet binary
  copy:
    src: "{{ kubelet_tmp_dir }}/{{ name }}"
    dest: "{{ kubelet_bin_dir }}/{{ name }}"
    mode: "0755"
    remote_src: yes

- name: Create kubelet config file
  template:
    src: kubelet-config.yml.j2
    dest: "{{ kubelet_config_dir }}/kubelet-config.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart kubelet

- name: Create kubelet systemd service
  template:
    src: kubelet.service.j2
    dest: /etc/systemd/system/kubelet.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart kubelet
