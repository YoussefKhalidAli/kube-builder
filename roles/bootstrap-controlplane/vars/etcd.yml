etcd_version: "v3.5.9"
etcd_name: "{{ ansible_hostname }}"

etcd_bin_dir: /usr/local/bin
etcd_data_dir: /var/lib/etcd
etcd_tmp_dir: /root/tmp

# etcd service parameters
restart: "on-failure"
restart_sec: 5
initial_cluster_state: "new"
initial_cluster_token: "etcd-cluster-0"
client_auths: "--client-cert-auth"
peer_auths: "--peer-client-cert-auth"
