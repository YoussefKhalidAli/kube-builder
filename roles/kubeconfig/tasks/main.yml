- name: Generate kubeconfigs
  template:
    src: kubeconfig.j2
    dest: "{{ kubeconfig_dir }}/{{ kubeconfig.file }}"
    owner: root
    group: root
    mode: "0600"
  vars:
    kubeconfig: "{{ item.value }}"
  loop: "{{ kubeconfigs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- include_tasks: workers.yml
  when: worker_certs is defined
