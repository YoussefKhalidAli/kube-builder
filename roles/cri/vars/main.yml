cri_options:
  containerd:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kube_repo_version }}/deb/"
    list: "kubernetes"
    package: containerd
    service: containerd
    socket: "unix:///var/run/containerd/containerd.sock"
  cri_o:
    url: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/{{ kube_repo_version }}/deb/"
    list: "cri-o"
    package: cri-o
    service: crio
    socket: "unix:///var/run/crio/crio.sock"

cri: "{{ cri_options.containerd }}"
