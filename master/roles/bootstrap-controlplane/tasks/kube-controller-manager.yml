- name: Load all cert vars
  include_vars: "{{ item }}"
  loop:
    - "{{ role_path }}/vars/kube-controller-manager.yml"
    - "{{ playbook_dir }}/roles/kubeconfig/vars/main.yml"

- name: Create kube-controller-manager directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ kube_controller_manager_tmp_dir }}"
    - "{{ kube_controller_manager_bin_dir }}"
    - "{{ kube_pki_dir }}"

- name: Download kube-controller-manager
  get_url:
    url: "https://dl.k8s.io/release/{{ k8s_version }}/bin/linux/{{ arch }}/kube-controller-manager"
    dest: "{{ kube_controller_manager_tmp_dir }}/{{ certs.kube_controller_manager.name }}"
    mode: "0644"

- name: Move kube-controller-manager binary
  copy:
    src: "{{ kube_controller_manager_tmp_dir }}/{{ certs.kube_controller_manager.name }}"
    dest: "{{ kube_controller_manager_bin_dir }}/{{ certs.kube_controller_manager.name }}"
    mode: "0755"
    remote_src: yes

- name: Copy kube-controller-manager certificates
  copy:
    src: "{{ cert_dir }}/{{ item }}"
    dest: "{{ kube_pki_dir }}/{{ item }}"
    owner: root
    group: root
    mode: "0600"
    remote_src: yes
  loop:
    - "{{ certs.kube_controller_manager.name }}.crt"
    - "{{ certs.kube_controller_manager.name }}.key"
    - "{{ ca_cert.name }}.crt"
    - "{{ ca_cert.name }}.key"
    - "{{ etcd_cert.name }}.crt"
    - "{{ etcd_cert.name }}.key"
    - "{{ certs.admin.name }}.crt"
    - "{{ certs.admin.name }}.key"
    - service-account.crt
    - service-account.key
    - apiserver-kubelet-client.crt
    - apiserver-kubelet-client.key

- name: Create kube-controller-manager systemd service
  template:
    src: kube-controller-manager.service.j2
    dest: /etc/systemd/system/kube-controller-manager.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart kube-controller-manager
