- name: Create etcd and kubernetes directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - /etc/etcd
    - "{{ etcd_data_dir }}"
    - "{{ kube_pki_dir }}"
    - "{{ etcd_tmp_dir }}"

- name: Download etcd archive
  get_url:
    url: "https://github.com/coreos/etcd/releases/download/{{ etcd_version }}/etcd-{{ etcd_version }}-linux-{{ arch }}.tar.gz"
    dest: "{{ etcd_tmp_dir }}/etcd-{{ etcd_version }}-linux-{{ arch }}.tar.gz"
    mode: "0644"

- name: Extract etcd archive
  unarchive:
    src: "{{ etcd_tmp_dir }}/etcd-{{ etcd_version }}-linux-{{ arch }}.tar.gz"
    dest: "{{ etcd_tmp_dir }}"
    remote_src: yes

- name: Move etcd binaries
  copy:
    src: "{{ etcd_tmp_dir }}/etcd-{{ etcd_version }}-linux-{{ arch }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: yes
  loop:
    - etcd
    - etcdctl

- name: Copy etcd server certificates
  copy:
    src: "{{ cert_dir }}/{{ item }}"
    dest: "/etc/etcd/{{ item }}"
    owner: root
    group: root
    mode: "0600"
    remote_src: yes
  loop:
    - etcd-server.key
    - etcd-server.crt

- name: Copy CA certificate to kubernetes pki
  copy:
    src: "{{ cert_dir }}/{{ ca_cert.name }}.crt"
    dest: "{{ kube_pki_dir }}/{{ ca_cert.name }}.crt"
    owner: root
    group: root
    mode: "0600"
    remote_src: yes

- name: Create symlink for CA certificate in etcd directory
  file:
    src: "{{ kube_pki_dir }}/{{ ca_cert.name }}.crt"
    dest: "/etc/etcd/{{ ca_cert.name }}.crt"
    state: link

- name: Create etcd systemd service
  template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart etcd
